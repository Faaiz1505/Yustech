<style>
/* ============================================
   CSS VARIABLES & THEMES
   ============================================ */
:root {
  --bg-primary: #;
  --bg-secondary: #12122a;
  --bg-card: rgba(20, 20, 50, 0.6);
  --bg-glass: rgba(255, 255, 255, 0.05);
  --text-primary: #ffffff;
  --text-secondary: #b0b0d0;
  --text-muted: #707090;
  --accent-primary: #00d4ff;
  --accent-secondary: #7c3aed;
  --accent-tertiary: #f59e0b;
  --accent-glow: rgba(0, 212, 255, 0.3);
  --border-color: rgba(255, 255, 255, 0.1);
  --shadow-glow: 0 0 40px rgba(0, 212, 255, 0.15);
  --glass-blur: 20px;
  --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-theme: background-color 0.6s ease, color 0.6s ease, border-color 0.6s ease;
  --font-primary: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
}

/* Cyber Theme */
[data-theme="cyber"] {
  --bg-primary: #0a0a0a;
  --bg-secondary: #1a0a1a;
  --accent-primary: #ff00ff;
  --accent-secondary: #00ff00;
  --accent-tertiary: #ffff00;
  --accent-glow: rgba(255, 0, 255, 0.3);
  --shadow-glow: 0 0 40px rgba(255, 0, 255, 0.15);
}

/* Space Theme */
[data-theme="space"] {
  --bg-primary: #050510;
  --bg-secondary: #0a0a20;
  --accent-primary: #4fc3f7;
  --accent-secondary: #7c4dff;
  --accent-tertiary: #ff6e40;
  --accent-glow: rgba(79, 195, 247, 0.3);
  --shadow-glow: 0 0 40px rgba(79, 195, 247, 0.15);
}

/* Ocean Theme */
[data-theme="ocean"] {
  --bg-primary: #00152e;
  --bg-secondary: #002a5c;
  --accent-primary: #00e5ff;
  --accent-secondary: #2979ff;
  --accent-tertiary: #00bfa5;
  --accent-glow: rgba(0, 229, 255, 0.3);
  --shadow-glow: 0 0 40px rgba(0, 229, 255, 0.15);
}

/* ============================================
   RESET & BASE
   ============================================ */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  font-family: var(--font-primary);
  background: var(--bg-primary);
  color: var(--text-primary);
  overflow-x: hidden;
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: var(--transition-theme);
}

/* Reduced motion support */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  html {
    scroll-behavior: auto;
  }
}

::selection {
  background: var(--accent-primary);
  color: var(--bg-primary);
}

::-webkit-scrollbar {
  width: 8px;
}

::-webkit-scrollbar-track {
  background: var(--bg-primary);
}

::-webkit-scrollbar-thumb {
  background: var(--accent-primary);
  border-radius: 4px;
}

::-webkit-scrollbar-thumb:hover {
  background: var(--accent-secondary);
}

/* ============================================
   NOISE OVERLAY (Premium Film Texture)
   ============================================ */
body::after {
  content: '';
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9998;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 256px 256px;
}

/* ============================================
   LOADING SCREEN
   ============================================ */

  left: 0;

.nav-logo {

#hero {

/* Scroll Progress Ring */
.scroll-progress-ring {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 50px;
  height: 50px;
  z-index: 2;
}

.scroll-progress-ring svg {
  transform: rotate(-90deg);
}

.scroll-progress-ring circle {
  fill: none;
  stroke-width: 2;
}

.scroll-progress-ring .bg {
  stroke: rgba(255,255,255,0.1);
}

.scroll-progress-ring .progress {
  stroke: var(--accent-primary);
  stroke-dasharray: 126;
  stroke-dashoffset: 126;
  transition: stroke-dashoffset 0.1s ease;
}

.scroll-progress-ring .arrow {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: var(--accent-primary);
  font-size: 0.8rem;
  animation: bounce-arrow 2s infinite;
}

@keyframes bounce-arrow {
  0%, 20%, 50%, 80%, 100% { transform: translate(-50%, -50%) translateY(0); }
  40% { transform: translate(-50%, -50%) translateY(-5px); }
  60% { transform: translate(-50%, -50%) translateY(-3px); }
}

   ABOUT SECTION
   ============================================ */
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

.about-founder {
  position: relative;
}

.founder-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 24px;
  padding: 40px;
  backdrop-filter: blur(20px);

  overflow: hidden;
}

.founder-card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;

  height: 200%;
  background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);

}

  justify-content: center;

  z-index: 1;
  box-shadow: 0 0 40px var(--accent-glow);
}

.founder-name {

}

.founder-role {

  font-size: 0.9rem;
  letter-spacing: 2px;

}

/* Timeline */
.timeline {
  position: relative;
  padding-left: 40px;
  margin-top: 40px;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 15px;
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, var(--accent-primary), var(--accent-secondary));
}

.timeline-item {
  position: relative;
  margin-bottom: 30px;
  padding: 20px;
  background: var(--bg-glass);
  border: 1px solid var(--border-color);
  border-radius: 12px;
  backdrop-filter: blur(10px);
  transition: var(--transition-smooth);
}

.timeline-item::before {
  content: '';
  position: absolute;
  left: -33px;
  top: 25px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent-primary);
  box-shadow: 0 0 20px var(--accent-glow);
}

.timeline-item:hover {
  border-color: var(--accent-primary);
  transform: translateX(10px);
}

.timeline-year {
  font-size: 0.8rem;
  color: var(--accent-primary);
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 5px;
}

.timeline-title {
  font-size: 1.1rem;
  margin-bottom: 5px;
}

.timeline-desc {
  font-size: 0.9rem;
  color: var(--text-muted);
}

   ============================================ */
.service
